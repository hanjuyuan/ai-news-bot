name: 每日AI资讯自动推送

on:
  push:
  workflow_dispatch: # 允许手动运行
  schedule:
    - cron: '0 1 * * *' # 每天北京时间 9:00 运行

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v3

      - name: 2. 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 3. 安装依赖
        # 这里我直接手动安装，防止 requirements.txt 里的中文干扰
        run: |
          pip install requests beautifulsoup4 feedparser schedule python-dateutil lxml

      - name: 4. 创建数据目录
        run: mkdir -p data

      - name: 5. 运行机器人
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        # 【关键修改】后面加上了 daily 参数
        run: python run.py daily

      - name: 6. 运行失败提醒
        if: failure()
        run: |
          curl '${{ secrets.DINGTALK_WEBHOOK }}' \
          -H 'Content-Type: application/json' \
          -d '{"msgtype":"text","text":{"content":"❌ 机器人运行失败，请检查 GitHub Actions 日志！关键词：机器人"}}'
