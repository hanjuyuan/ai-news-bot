name: AI新闻机器人定时任务

on:
  push:
  workflow_dispatch:
  schedule:
    # 每天北京时间 11:00 (UTC 03:00)
    - cron: '0 3 * * *'
    # 每天北京时间 15:30 (UTC 07:30)
    - cron: '30 7 * * *'
    # 每周一北京时间 09:00 (UTC 01:00) 运行周总结
    - cron: '0 1 * * 1'
    # 每月最后一天北京时间 09:00 (UTC 01:00) 运行月总结
    - cron: '0 1 28-31 * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v3

      - name: 2. 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 3. 安装依赖
        run: |
          pip install requests beautifulsoup4 feedparser python-dateutil lxml

      - name: 4. 创建文件夹
        run: mkdir -p data

      - name: 5. 运行机器人逻辑
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: |
          # 获取北京时间的小时和日期
          HOUR=$(date -u -d "+8 hours" +%H)
          MINUTE=$(date -u -d "+8 hours" +%M)
          DAY_OF_WEEK=$(date -u -d "+8 hours" +%u)
          
          if [ "$HOUR" == "09" ] && [ "$DAY_OF_WEEK" == "1" ]; then
            echo "执行周总结任务..."
            python run.py weekly
          elif [ "$HOUR" == "09" ] && [ "$(date -d "+8 hours +1 day" +%d)" == "01" ]; then
            echo "执行月总结任务..."
            python run.py monthly
          else
            echo "执行每日AI资讯推送..."
            python run.py daily
          fi
