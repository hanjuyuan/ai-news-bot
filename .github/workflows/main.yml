name: 钉钉推送通知

on: [push]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 发送钉钉消息
        run: |
          curl '${{ secrets.DINGTALK_WEBHOOK }}' \
          -H 'Content-Type: application/json' \
          -d '{
            "msgtype": "markdown",
            "markdown": {
              "title": "项目更新通知",
              "text": "### 🚀 GitHub 项目更新\n**项目**: 人工智能新闻机器人\n**提交人**: ${{ github.actor }}\n**说明**: ${{ github.event.head_commit.message }}\n**关键词**: 机器人\n\n[点击查看详情](${{ github.event.head_commit.url }})"
            }
          }'
